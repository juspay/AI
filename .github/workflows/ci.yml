name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
      - run: nix profile install github:juspay/vira --accept-flake-config
      - name: Configure Attic cache
        if: github.ref == 'refs/heads/main'
        run: nix shell nixpkgs#attic-client -c attic login cache-nixos-asia https://cache.nixos.asia "$ATTIC_TOKEN"
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
      - run: vira ci
        env:
          GH_TOKEN: ${{ github.token }}
